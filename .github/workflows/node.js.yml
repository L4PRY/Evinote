name: Node.js

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js (latest LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          # Keep this only if package-lock.json exists in repo root:
          # cache: npm

      - name: create .env file
        run: cp .env.example .env
      - run: npm install
      - name: build project
        run: npm run build --if-present
      - name: run svelte-kit check
        run: npm run check
      - name: run tests
        run: npm run test
